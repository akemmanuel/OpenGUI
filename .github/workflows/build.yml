name: Build

on:
  push:
    tags: ["v*"]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint:check

      - name: Typecheck
        run: bun run typecheck

      - name: Build frontend
        run: bun run build

      - name: Run unit tests
        run: bun test

      - name: Build Docker image
        run: docker build -t opengui:web .

      - name: Package .deb
        run: bunx electron-builder --linux deb --publish never

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v6
        with:
          name: linux-deb
          path: release/*.deb
          retention-days: 30

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint:check

      - name: Typecheck
        run: bun run typecheck

      - name: Build frontend
        run: bun run build

      - name: Package mac artifacts
        run: bunx electron-builder --mac dmg zip --x64 --arm64 --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload mac artifacts
        uses: actions/upload-artifact@v6
        with:
          name: mac-release
          path: |
            release/*.dmg
            release/*.zip
            release/*.blockmap
            release/latest-mac.yml
          retention-days: 30

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint:check

      - name: Typecheck
        run: bun run typecheck

      - name: Build frontend
        run: bun run build

      - name: Package .exe (NSIS)
        run: bunx electron-builder --win nsis --publish never

      - name: Verify Windows updater metadata
        shell: pwsh
        run: |
          $latest = "release/latest.yml"
          if (!(Test-Path $latest)) {
            throw "Missing $latest"
          }

          $content = Get-Content $latest -Raw
          $paths = @()
          foreach ($line in ($content -split "`n")) {
            if ($line -match '^\s*-?\s*url:\s*(.+)$') {
              $paths += $Matches[1].Trim().Trim('"').Trim("'")
            }
            if ($line -match '^path:\s*(.+)$') {
              $paths += $Matches[1].Trim().Trim('"').Trim("'")
            }
          }

          if ($paths.Count -eq 0) {
            throw "No updater asset paths found in $latest"
          }

          foreach ($asset in ($paths | Select-Object -Unique)) {
            $assetPath = Join-Path "release" $asset
            if (!(Test-Path $assetPath)) {
              throw "Windows updater metadata references missing asset: $asset"
            }
          }

      - name: Upload Windows updater artifacts
        uses: actions/upload-artifact@v6
        with:
          name: windows-nsis
          path: |
            release/*.exe
            release/*.blockmap
            release/latest.yml
          retention-days: 30

  publish-docker:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux, build-mac, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/akemmanuel/opengui
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=OpenGUI
            org.opencontainers.image.description=OpenGUI web command center for coding agents
            org.opencontainers.image.source=https://github.com/akemmanuel/OpenGUI
            org.opencontainers.image.url=https://github.com/akemmanuel/OpenGUI
            org.opencontainers.image.licenses=MIT

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux, build-mac, build-windows, publish-docker]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download linux artifact
        uses: actions/download-artifact@v6
        with:
          name: linux-deb
          path: artifacts/linux-deb

      - name: Download mac artifact
        uses: actions/download-artifact@v6
        with:
          name: mac-release
          path: artifacts/mac-release

      - name: Download windows artifact
        uses: actions/download-artifact@v6
        with:
          name: windows-nsis
          path: artifacts/windows-nsis

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/linux-deb/*.deb
            artifacts/mac-release/*.dmg
            artifacts/mac-release/*.zip
            artifacts/mac-release/*.blockmap
            artifacts/mac-release/latest-mac.yml
            artifacts/windows-nsis/*.exe
            artifacts/windows-nsis/*.blockmap
            artifacts/windows-nsis/latest.yml
