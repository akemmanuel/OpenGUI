name: crocodile

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  review:
    if: github.event.pull_request.head.repo.full_name == github.repository || github.event.pull_request.author_association == 'MEMBER' || github.event.pull_request.author_association == 'OWNER' || github.event.pull_request.author_association == 'COLLABORATOR'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write
      issues: write
    steps:
      # Safe with pull_request_target because no PR code gets checked out or executed.
      # Restrict to trusted authors only because action may fetch repo content internally.
      - uses: anomalyco/opencode/github@latest
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          model: opencode/minimax-m2.5-free
          use_github_token: true
          prompt: |
            Review this pull request:
            - Check for code quality issues
            - Look for potential bugs
            - Suggest improvements
            Your response should contain:
            - A score "Confidence Score" from 1 to 5
            - Any issues you deteced in the PR, properly formatted into codeblocks.
